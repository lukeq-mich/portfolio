<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#FBF8F1">
<title>Portfolio</title>
<meta name="description" content="__SEO_DESC__">
<meta property="og:title" content="__SEO_TITLE__">
<meta property="og:description" content="__SEO_DESC__">
<meta property="og:type" content="website">
<meta property="og:url" content="__SEO_URL__">
<meta property="og:image" content="__SEO_IMAGE__">
<meta name="twitter:card" content="__SEO_CARD__">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,50&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F1;
    --ink:#201E19;
    --graphite:#6F6A5E;
    --rule:#D9D2C3;
    --red:#A02A1C;
    --font-display:"Fraunces", serif;
    --font-body:"Newsreader", serif;
    --font-mono:"IBM Plex Mono", monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:1.125rem;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration-thickness:1px;text-underline-offset:3px}
  a:hover{color:var(--red)}
  a:focus-visible,button:focus-visible{outline:2px solid var(--red);outline-offset:3px}
  .wrap{max-width:1120px;margin:0 auto;padding:0 clamp(1.25rem,4vw,3.5rem)}
  .mono{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase}

  /* ---------- masthead ---------- */
  header.masthead{padding-top:2.25rem}
  .mast-top{
    display:flex;justify-content:space-between;align-items:baseline;
    gap:1rem;padding-bottom:.85rem;border-bottom:2px solid var(--ink);
  }
  .mast-top .issue{color:var(--graphite)}
  .mast-top-right{display:flex;align-items:baseline;gap:.9rem}
  .gh-icon-link{display:flex;align-items:center;color:var(--graphite)}
  .gh-icon-link:hover{color:var(--red)}
  .gh-icon-link svg{width:1.05rem;height:1.05rem;display:block;fill:currentColor}
  .mast-name{
    font-family:var(--font-display);
    font-weight:340;
    font-size:clamp(2.8rem,7.5vw,5.6rem);
    line-height:1.02;
    letter-spacing:-.015em;
    padding:1.6rem 0 .4rem;
    max-width:14ch;
  }
  .mast-intro{
    display:grid;grid-template-columns:minmax(0,7fr) minmax(0,5fr);
    gap:2rem;align-items:end;padding:.5rem 0 2.5rem;
  }
  .mast-intro p{font-size:1.2rem;font-weight:300;max-width:52ch}
  .mast-intro .contact{justify-self:end;text-align:right;color:var(--graphite);line-height:2}
  .mast-intro .contact a{text-decoration:none;border-bottom:1px solid var(--rule)}

  /* ---------- contents ---------- */
  .contents{border-top:1px solid var(--ink);padding:1.4rem 0 3.5rem}
  .contents h2{font-family:var(--font-mono);font-size:.72rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--graphite);margin-bottom:1.1rem}
  .toc-row{
    display:grid;grid-template-columns:5.5rem 1fr auto;gap:1rem;
    align-items:baseline;padding:.55rem 0;border-bottom:1px dotted var(--rule);
    text-decoration:none;
  }
  .toc-row .code{color:var(--red)}
  .toc-row .t{font-family:var(--font-display);font-weight:400;font-size:1.25rem}
  .toc-row .yr{color:var(--graphite)}
  .toc-row:hover .t{color:var(--red)}

  /* ---------- project entries ---------- */
  section.projects{padding-bottom:2rem}
  article.entry{
    display:grid;
    grid-template-columns:minmax(0,4fr) minmax(0,8fr);
    gap:clamp(1.5rem,4vw,4rem);
    padding:3.2rem 0;
    border-top:1px solid var(--ink);
  }
  article.entry:nth-of-type(even){grid-template-columns:minmax(0,8fr) minmax(0,4fr)}
  article.entry:nth-of-type(even) .rail{order:2}
  article.entry:nth-of-type(even) .body{order:1}

  .rail{position:relative}
  .rail .code{color:var(--red);display:block;margin-bottom:1.2rem}
  .spec{border-top:1px solid var(--rule)}
  .spec div{
    display:flex;justify-content:space-between;gap:1rem;
    padding:.5rem 0;border-bottom:1px solid var(--rule);
    font-family:var(--font-mono);font-size:.72rem;letter-spacing:.04em;
  }
  .spec dt{color:var(--graphite);text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}
  .spec dd{text-align:right}
  .stamp{
    display:inline-block;margin-top:1.4rem;
    font-family:var(--font-mono);font-size:.68rem;font-weight:500;
    letter-spacing:.18em;text-transform:uppercase;color:var(--red);
    border:1.5px solid var(--red);border-radius:2px;
    padding:.4rem .7rem;transform:rotate(-2.5deg);
  }

  .body .cover{display:block;width:100%;height:auto;border:1px solid var(--rule);margin-bottom:1.5rem}
  .body h3{
    font-family:var(--font-display);font-weight:380;
    font-size:clamp(1.7rem,3.4vw,2.5rem);line-height:1.08;
    letter-spacing:-.01em;margin-bottom:.5rem;
  }
  .body .tagline{
    font-style:italic;font-weight:300;font-size:1.25rem;
    color:var(--graphite);margin-bottom:1.3rem;
  }
  .body .desc{max-width:60ch;margin-bottom:1.8rem;font-weight:300}
  .body .outcome{
    max-width:60ch;margin-bottom:1.8rem;padding-left:1rem;
    border-left:2px solid var(--red);font-weight:400;
  }
  .body .outcome .mono{color:var(--red);display:block;margin-bottom:.25rem}

  .taglist{display:flex;flex-wrap:wrap;gap:.45rem;margin-bottom:1.6rem}
  .taglist .lbl{color:var(--graphite);margin-right:.35rem;align-self:center}
  .tag{
    font-family:var(--font-mono);font-size:.7rem;letter-spacing:.05em;
    border:1px solid var(--rule);border-radius:999px;
    padding:.28rem .7rem;background:transparent;
  }

  .artefacts{border-top:1px solid var(--rule)}
  .artefacts a{
    display:grid;grid-template-columns:4.5rem 1fr auto;gap:1rem;
    align-items:baseline;padding:.6rem 0;border-bottom:1px solid var(--rule);
    text-decoration:none;
  }
  .artefacts a .sheet{color:var(--red)}
  .artefacts a .name{font-weight:400}
  .artefacts a .arrow{color:var(--graphite);font-family:var(--font-mono);font-size:.8rem}
  .artefacts a:hover .name{color:var(--red)}

  /* ---------- capability registers ---------- */
  section.registers{border-top:2px solid var(--ink);padding:2.5rem 0 4rem}
  .registers h2{
    font-family:var(--font-display);font-weight:380;
    font-size:clamp(1.6rem,3vw,2.2rem);margin-bottom:2rem;
  }
  .reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,5rem)}
  .reg-col h3{font-family:var(--font-mono);font-size:.76rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);padding-bottom:.45rem;border-bottom:1px solid var(--ink);margin-bottom:1rem}
  .reg-item{padding:.85rem 0;border-bottom:1px solid var(--rule)}
  .reg-item .top{display:flex;justify-content:space-between;gap:1rem;align-items:baseline}
  .reg-item .nm{font-family:var(--font-display);font-weight:400;font-size:1.15rem}
  .reg-item .pf{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:var(--red)}
  .reg-item .ct{font-family:var(--font-mono);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--graphite)}

  footer{border-top:1px solid var(--ink);padding:1.5rem 0 3rem;display:flex;justify-content:space-between;align-items:center;gap:1rem;color:var(--graphite);flex-wrap:wrap}
  .editor-link{border:1px solid var(--rule);border-radius:2px;padding:.4rem .8rem;text-decoration:none;color:var(--graphite)}
  .editor-link:hover{border-color:var(--red);color:var(--red)}

  .loading,.error{padding:5rem 0;color:var(--graphite);font-style:italic}
  .error{color:var(--red)}

  @media (max-width:760px){
    .mast-intro{grid-template-columns:1fr}
    .mast-intro .contact{justify-self:start;text-align:left}
    article.entry,article.entry:nth-of-type(even){grid-template-columns:1fr;gap:1.5rem}
    article.entry:nth-of-type(even) .rail{order:1}
    article.entry:nth-of-type(even) .body{order:2}
    .reg-grid{grid-template-columns:1fr}
    .toc-row{grid-template-columns:4rem 1fr}
    .toc-row .yr{display:none}
  }
</style>
</head>
<body>

<header class="masthead wrap">
  <div class="mast-top">
    <span class="mono issue" id="issue-line">Project register</span>
    <div class="mast-top-right">
      <span class="mono issue" id="updated-line"></span>
      <a class="gh-icon-link" href="https://github.com/lukeq-mich" target="_blank" rel="noopener" aria-label="GitHub profile">
        <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      </a>
    </div>
  </div>
  <h1 class="mast-name" id="site-name"></h1>
  <div class="mast-intro">
    <p id="site-intro"></p>
    <div class="contact mono" id="site-contact"></div>
  </div>
</header>

<main class="wrap">
  <nav class="contents" aria-label="Project contents">
    <h2>Contents</h2>
    <div id="toc"><p class="loading">Loading register…</p></div>
  </nav>

  <section class="projects" id="projects" aria-label="Projects"></section>

  <section class="registers" aria-label="Skills and tools">
    <h2>Capability register</h2>
    <div class="reg-grid">
      <div class="reg-col"><h3>Skills</h3><div id="skills-list"></div></div>
      <div class="reg-col"><h3>Tools</h3><div id="tools-list"></div></div>
    </div>
  </section>
</main>

<footer class="wrap mono">
  <span id="footer-name"></span>
  <span>Compiled by hand · Set in Fraunces &amp; Newsreader</span>
  <a class="editor-link" href="admin.html">Editor login</a>
</footer>

<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  const SHEET_CODES = { "Report":"RPT", "Drawing":"DRG", "Poster":"PST", "Code":"COD", "Photo":"PHO", "Video":"VID" };

  let data;
  try {
    const res = await fetch("data/data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(res.status);
    data = await res.json();
  } catch (e) {
    $("toc").innerHTML = '<p class="error">Could not load data/data.json — check the file exists in the repository.</p>';
    return;
  }

  const meta = data.meta || {};
  if (meta.accent && /^#[0-9A-Fa-f]{6}$/.test(meta.accent)) document.documentElement.style.setProperty("--red", meta.accent);
  const skills = data.skills || [];
  const tools = data.tools || [];
  const byId = (list) => Object.fromEntries(list.map(x => [x.id, x]));
  const skillById = byId(skills), toolById = byId(tools);

  // Masthead
  document.title = (meta.name ? meta.name + " — " : "") + (meta.title || "Portfolio");
  $("site-name").textContent = meta.name || "";
  $("footer-name").textContent = meta.name || "";
  $("site-intro").textContent = meta.intro || "";
  $("issue-line").textContent = (meta.title || "Project register") + " · " + new Date().getFullYear();
  if (meta.updated) $("updated-line").textContent = "Rev. " + meta.updated;
  const contactBits = [];
  if (meta.email) contactBits.push('<a href="mailto:' + esc(meta.email) + '">' + esc(meta.email) + '</a>');
  if (meta.linkedin) contactBits.push('<a href="' + esc(meta.linkedin) + '" target="_blank" rel="noopener">LinkedIn</a>');
  if (meta.resume) contactBits.push('<a href="' + esc(meta.resume) + '" target="_blank" rel="noopener">Résumé (PDF)</a>');
  $("site-contact").innerHTML = contactBits.join(" · ");

  // Order: featured first, then most recent year of study
  const projects = (data.projects || []).slice().sort((a, b) =>
    (b.featured === true) - (a.featured === true) || (b.yearOfStudy || 0) - (a.yearOfStudy || 0)
  );

  // Contents
  $("toc").innerHTML = projects.map((p, i) => {
    const code = "PRJ-" + String(i + 1).padStart(2, "0");
    return '<a class="toc-row" href="#' + esc(p.id) + '">' +
      '<span class="mono code">' + code + '</span>' +
      '<span class="t">' + esc(p.name) + '</span>' +
      '<span class="mono yr">' + esc(p.category || "") + (p.yearOfStudy ? " · Yr " + esc(p.yearOfStudy) : "") + '</span></a>';
  }).join("") || '<p class="loading">No projects yet — add one from the admin page.</p>';

  // Entries
  const specRow = (label, value) => value ? "<div><dt>" + esc(label) + "</dt><dd>" + esc(value) + "</dd></div>" : "";
  const tagRow = (label, items) => items.length
    ? '<div class="taglist"><span class="mono lbl">' + label + '</span>' +
      items.map(x => '<span class="tag">' + esc(x.name) + "</span>").join("") + "</div>"
    : "";

  $("projects").innerHTML = projects.map((p, i) => {
    const code = "PRJ-" + String(i + 1).padStart(2, "0");
    const pSkills = (p.skillIds || []).map(id => skillById[id]).filter(Boolean);
    const pTools = (p.toolIds || []).map(id => toolById[id]).filter(Boolean);
    const counters = {};
    const artefacts = (p.artefacts || []).map(a => {
      const pre = SHEET_CODES[a.type] || "DOC";
      counters[pre] = (counters[pre] || 0) + 1;
      const sheet = pre + "-" + String(counters[pre]).padStart(2, "0");
      return '<a href="' + esc(a.url) + '" target="_blank" rel="noopener">' +
        '<span class="mono sheet">' + sheet + '</span>' +
        '<span class="name">' + esc(a.title) + '</span>' +
        '<span class="arrow">open ↗</span></a>';
    }).join("");

    return '<article class="entry" id="' + esc(p.id) + '">' +
      '<div class="rail">' +
        '<span class="mono code">' + code + '</span>' +
        '<dl class="spec">' +
          specRow("Year", p.yearOfStudy ? "Year " + p.yearOfStudy : "") +
          specRow("Category", p.category) +
          specRow("Type", p.type) +
          specRow("Status", p.status) +
          specRow("Role", p.role) +
          (p.repoUrl ? '<div><dt>Repository</dt><dd><a href="' + esc(p.repoUrl) + '" target="_blank" rel="noopener">View on GitHub ↗</a></dd></div>' : "") +
        "</dl>" +
        (p.featured ? '<span class="stamp">Featured</span>' : "") +
      "</div>" +
      '<div class="body">' +
        (p.coverImage ? '<img class="cover" src="' + esc(p.coverImage) + '" alt="' + esc(p.name) + ' cover image" loading="lazy">' : "") +
        "<h3>" + esc(p.name) + "</h3>" +
        (p.tagline ? '<p class="tagline">' + esc(p.tagline) + "</p>" : "") +
        (p.description ? '<p class="desc">' + esc(p.description) + "</p>" : "") +
        (p.outcome ? '<p class="outcome"><span class="mono">Outcome</span>' + esc(p.outcome) + "</p>" : "") +
        tagRow("Skills", pSkills) +
        tagRow("Tools", pTools) +
        (artefacts ? '<div class="artefacts">' + artefacts + "</div>" : "") +
      "</div></article>";
  }).join("");

  // Capability register
  const regItem = (x) => {
    const cats = Array.isArray(x.categories) ? x.categories.join(" · ") : (x.category || x.type || "");
    return '<div class="reg-item"><div class="top"><span class="nm">' + esc(x.name) + '</span>' +
      (x.proficiency ? '<span class="pf">' + esc(x.proficiency) + "</span>" : "") + "</div>" +
      (cats ? '<span class="ct">' + esc(cats) + "</span>" : "") +
      "</div>";
  };

  $("skills-list").innerHTML = skills.map(regItem).join("");
  $("tools-list").innerHTML = tools.map(regItem).join("");
})();
</script>
</body>
</html>
